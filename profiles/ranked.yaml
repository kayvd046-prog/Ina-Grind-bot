name: ranked
mode: ranked
templates_subdir: ranked
match_threshold: 0.85
phase2_enabled: false
# Capture from the game window (works while alt-tabbed / in background).
# Set to "screen" to capture the visible foreground screen instead.
capture_backend: window
window_title: INAZUMA ELEVEN
button_map:
  confirm: A
  cancel: B
  commander_toggle: Y
  menu: START
timings:
  poll_interval: 0.4
  tap_cooldown: 0.6
  stuck_seconds: 40
  recovery_backoff: 3.0
detection: composite        # ocr | template | composite
ocr:
  lang: en
  min_confidence: 0.5
  region: null              # null = whole frame
  keywords:
    MAIN_MENU:   ["press start", "continue", "play"]
    KICKOFF:     ["kick off", "commander"]
    HALFTIME:    ["half time"]
    GOAL:        ["goal"]
    FULLTIME:    ["full time"]
    REWARDS:     ["reward", "rewards"]
    POST_MATCH:  ["match result", "results", "next"]
    REMATCH:     ["rematch"]
    LOADING:     ["loading", "now loading"]
    ERROR_DIALOG: ["error", "disconnected", "communication"]
